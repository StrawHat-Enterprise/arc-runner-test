name: Test Community ARC Runner

on:
  workflow_dispatch:
    push:
        branches: [main]

        jobs:
          test-community-arc:
              runs-on: [self-hosted, linux, x64, community-arc]
                  steps:
                        - name: Checkout
                                uses: actions/checkout@v4

                                            - name: Show runner info
                                                    run: |
                                                              echo "Hello from Community ARC Runner!"
                                                                        echo "Runner name: $RUNNER_NAME"
                                                                                  echo "Runner OS: $RUNNER_OS"
                                                                                            uname -a
                                                                                                      echo "Working directory: $(pwd)"
                                                                                                                echo "Current time: $(date)"
