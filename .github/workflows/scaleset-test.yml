name: Test GitHub ScaleSet Runner

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test-gh-scaleset:
    runs-on: gh-arc-runners
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Show runner info
        run: |
          echo "Hello from GitHub ARC Scale Set Runner!"
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          uname -a
          echo "Working directory: $(pwd)"
          echo "Current time: $(date)"

  test-labeled-scaleset:
    runs-on: aks-labeled-runners
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Show runner info
        run: |
          echo "Hello from AKS Labeled Scale Set Runner!"
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          uname -a
          echo "Working directory: $(pwd)"
          echo "Current time: $(date)"
